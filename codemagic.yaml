# Codemagic CI/CD Build Configuration for StudioBP Network iOS App
# This YAML contains dual workflows: one for real device IPA delivery and one for simulator virtual testing (Appetize.io).

workflows:
  ios-swift-pwa-builder:
    name: Build StudioBP Network iOS App (Device IPA)
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      vars:
        XCODE_WORKSPACE: "pwa-shell.xcworkspace"
        XCODE_SCHEME: "pwa-shell"
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
    scripts:
      - name: CocoaPods installation
        script: |
          pod install
      - name: Xcode build
        script: |
          set -e
          
          # Count installed provisioning profiles in the local build machine
          PROFILES_COUNT=$(find "$HOME/Library/MobileDevice/Provisioning Profiles" -type f \( -name "*.mobileprovision" -o -name "*.provisionprofile" \) 2>/dev/null | wc -l)
          
          if [ "$PROFILES_COUNT" -gt 0 ] && [ -f "$HOME/export_options.plist" ]; then
            echo "--- Active Provisioning Profiles found ($PROFILES_COUNT). Running SIGNED production build ---"
            
            # Setup Keychain and parse provisioning profiles matching the target
            keychain initialize
            xcode-project use-profiles
            
            # Compile and export using Codemagic's built-in signed builder
            xcode-project build-ipa \
              --workspace "$XCODE_WORKSPACE" \
              --scheme "$XCODE_SCHEME"
          else
            echo "--- No active code signing found ($PROFILES_COUNT profiles). Running UNSIGNED build ---"
            echo "--- Optimizing Entitlements for unsigned compilation target ---"
            
            # Simplify entitlements file in a single line to avoid YAML indentation/heredoc parsing issues
            echo '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict></dict></plist>' > pwa-shell/Entitlements/Entitlements.plist
            
            # Compile releasing unsigned .xcarchive cleanly bypassing security gates
            xcodebuild \
              -workspace "$XCODE_WORKSPACE" \
              -scheme "$XCODE_SCHEME" \
              -configuration Release \
              -archivePath build/ios/xcarchive/pwa-shell.xcarchive \
              archive \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              COMPILER_INDEX_STORE_ENABLE=NO

            # Repackage the compiled binary .app into a transportable unsigned .ipa using the standard Payload format
            echo "--- Packaging compiled files into transportable payload .ipa package ---"
            mkdir -p build/ios/ipa/Payload
            cp -r build/ios/xcarchive/pwa-shell.xcarchive/Products/Applications/*.app build/ios/ipa/Payload/
            cd build/ios/ipa
            zip -r pwa-shell.ipa Payload
            cd ../../..
          fi
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - domenico@studiotronic.it

  ios-simulator-builder:
    name: Build StudioBP Network iOS Simulator (for Appetize.io)
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      vars:
        XCODE_WORKSPACE: "pwa-shell.xcworkspace"
        XCODE_SCHEME: "pwa-shell"
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
    scripts:
      - name: CocoaPods installation
        script: |
          pod install
      - name: Xcode build for Simulator
        script: |
          set -e
          echo "--- Building for iOS Simulator (x86_64 / arm64 architecture) ---"
          
          # Simplify entitlements file to prevent capabilities error blocks during unsigned compilation
          echo '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict></dict></plist>' > pwa-shell/Entitlements/Entitlements.plist
          
          # Compile targeted specifically at the iOS Simulator SDK
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphonesimulator \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            COMPILER_INDEX_STORE_ENABLE=NO

          # Package the compiled .app bundle into a .zip file at the root level as requested by Appetize
          echo "--- Packaging compiled .app bundle into a .zip archive for simulator testing ---"
          mkdir -p build/ios/simulator
          cp -r build/Build/Products/Release-iphonesimulator/*.app build/ios/simulator/
          cd build/ios/simulator
          zip -r pwa-shell-simulator.zip *.app
          cd ../../..
    artifacts:
      - build/ios/simulator/*.zip
    publishing:
      email:
        recipients:
          - domenico@studiotronic.it